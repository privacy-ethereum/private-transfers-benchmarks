type WormProtocolStats @entity(immutable: false) {
  id: ID!
  totalTxCount: BigInt!
  totalGasUsed: BigInt!

  withdraw: WormOperationStats!
}

type WormOperationStats @entity(immutable: false) {
  id: ID!
  totalCount: BigInt!
  totalGasUsed: BigInt!
}

type WormWithdraw @entity(immutable: true) {
  id: ID!
  to: Bytes!
  value: BigInt!

  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
  gasUsed: BigInt!
  gasPrice: BigInt!
}
