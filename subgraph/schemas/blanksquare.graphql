type BlanksquareProtocolStats @entity(immutable: false) {
  id: ID!
  totalTxCount: BigInt!
  totalGasUsed: BigInt!

  deposit: BlanksquareOperationStats!
  withdraw: BlanksquareOperationStats!
}

type BlanksquareOperationStats @entity(immutable: false) {
  id: ID!
  totalCount: BigInt!
  totalGasUsed: BigInt!
  totalValue: BigInt!

  depositStats: [BlanksquareDepositStats!]! @derivedFrom(field: "operationStats")
  withdrawStats: [BlanksquareWithdrawStats!]! @derivedFrom(field: "operationStats")
}

type BlanksquareDepositStats @entity(immutable: false) {
  id: ID!
  totalCount: BigInt!
  totalGasUsed: BigInt!
  totalValue: BigInt!

  operationStats: BlanksquareOperationStats!
}

type BlanksquareWithdrawStats @entity(immutable: false) {
  id: ID!
  totalCount: BigInt!
  totalGasUsed: BigInt!
  totalValue: BigInt!

  operationStats: BlanksquareOperationStats!
}

type BlanksquareDeposit @entity(immutable: true) {
  id: ID!
  value: BigInt!
  tokenAddress: Bytes!

  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
  gasUsed: BigInt!
  gasPrice: BigInt!
}

type BlanksquareWithdraw @entity(immutable: true) {
  id: ID!
  value: BigInt!
  tokenAddress: Bytes!

  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
  gasUsed: BigInt!
  gasPrice: BigInt!
}
