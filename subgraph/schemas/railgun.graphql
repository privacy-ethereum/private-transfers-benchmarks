type RailgunProtocolStats @entity(immutable: false) {
  id: ID!
  totalTxCount: BigInt!
  totalGasUsed: BigInt!

  shield: RailgunOperationStats!
  unshield: RailgunOperationStats!
  transact: RailgunOperationStats!
}

type RailgunShieldTokenStats @entity(immutable: false) {
  id: ID!
  tokenAddress: Bytes!
  totalCount: BigInt!
  totalGasUsed: BigInt!
  totalValue: BigInt!

  operationStats: RailgunOperationStats!
}

type RailgunUnshieldTokenStats @entity(immutable: false) {
  id: ID!
  tokenAddress: Bytes!
  totalCount: BigInt!
  totalGasUsed: BigInt!
  totalValue: BigInt!

  operationStats: RailgunOperationStats!
}

type RailgunOperationStats @entity(immutable: false) {
  id: ID!
  totalCount: BigInt!
  totalGasUsed: BigInt!

  shieldTokenStats: [RailgunShieldTokenStats!]! @derivedFrom(field: "operationStats")
  unshieldTokenStats: [RailgunUnshieldTokenStats!]! @derivedFrom(field: "operationStats")
}

type RailgunShield @entity(immutable: true) {
  id: ID!
  treeNumber: BigInt!
  startPosition: BigInt!
  fees: [BigInt!]!

  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
  gasUsed: BigInt!
  gasPrice: BigInt!
}

type RailgunUnshield @entity(immutable: true) {
  id: ID!
  to: Bytes!

  tokenType: Int!
  tokenAddress: Bytes!
  tokenSubID: BigInt!

  amount: BigInt!
  fee: BigInt!

  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
  gasUsed: BigInt!
  gasPrice: BigInt!
}

type RailgunTransact @entity(immutable: true) {
  id: ID!
  treeNumber: BigInt!
  startPosition: BigInt!
  hash: [Bytes!]!

  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
  gasUsed: BigInt!
  gasPrice: BigInt!
}
