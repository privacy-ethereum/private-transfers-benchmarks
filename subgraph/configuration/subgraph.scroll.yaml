specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ../schema.graphql
dataSources:
  - kind: ethereum
    name: Withdrawal
    network: scroll
    source:
      address: "0x86B06D2604D9A6f9760E8f691F86d5B2a7C9c449"
      abi: Withdrawal
      startBlock: 17261676
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - IntmaxScrollProtocolStats
        - IntmaxScrollOperationStats
        - IntmaxScrollWithdrawalStats
        - IntmaxScrollWithdrawal
      abis:
        - name: Withdrawal
          file: ../abis/intmax/Withdrawal.json
      eventHandlers:
        - event: DirectWithdrawalQueued(indexed bytes32,indexed address,(address,uint32,uint256,bytes32))
          handler: handleWithdrawal
          receipt: true
      file: ../src/intmax/withdrawal.ts
