specVersion: 1.3.0
indexerHints:
  prune: auto

schema:
  file: ../schema.graphql

dataSources:
  - kind: ethereum
    name: RailgunSmartWallet
    network: mainnet
    source:
      address: "0xfa7093cdd9ee6932b4eb2c9e1cde7ce00b1fa4b9"
      abi: RailgunSmartWallet
      startBlock: 14693013
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - RailgunShield
        - RailgunUnshield
        - RailgunTransact
      abis:
        - name: RailgunSmartWallet
          file: ../abis/railgun/RailgunSmartWallet.json
      eventHandlers:
        - event: Shield(uint256,uint256,(bytes32,(uint8,address,uint256),uint120)[],(bytes32[3],bytes32)[],uint256[])
          handler: handleShield
          receipt: true
        - event: Unshield(address,(uint8,address,uint256),uint256,uint256)
          handler: handleUnshield
          receipt: true
        - event: Transact(uint256,uint256,bytes32[],(bytes32[4],bytes32,bytes32,bytes,bytes)[])
          handler: handleTransact
          receipt: true
      file: ../src/railgun/railgun-smart-wallet.ts

  - kind: ethereum
    name: InstanceRegistry
    network: mainnet
    source:
      address: "0xB20c66C4DE72433F3cE747b58B86830c459CA911"
      abi: InstanceRegistry
      startBlock: 14173395
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - TornadoCashInstance
      abis:
        - name: InstanceRegistry
          file: ../abis/tornado-cash/InstanceRegistry.json
      eventHandlers:
        - event: InstanceStateUpdated(indexed address,uint8)
          handler: handleInstanceStateUpdated
      file: ../src/tornado-cash/instance-registry.ts

  - kind: ethereum
    name: HinkalPool
    network: mainnet
    source:
      address: "0x25e5e82f5702A27C3466fE68f14abDbbAdFca826"
      abi: HinkalPool
      startBlock: 22798696
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - HinkalShieldERC20
        - HinkalShieldNative
        - HinkalUnshieldERC20
        - HinkalUnshieldNative
        - HinkalTransact
      abis:
        - name: HinkalPool
          file: ../abis/hinkal/HinkalPool.json
      eventHandlers:
        - event: NewCommitment(uint256,int256,bytes)
          handler: handleNewCommitment
          receipt: true
        - event: Nullified(uint256)
          handler: handleNullified
          receipt: true
      file: ../src/hinkal/hinkal-pool.ts

  - kind: ethereum
    name: SmartAccountRelayer
    network: mainnet
    source:
      address: "0x8090a9DB6Aca56fFA186C75Ca0787B18af1058a0"
      abi: SmartAccountRelayer
      startBlock: 23649119
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - FluidkeyOperationRelayed
      abis:
        - name: SmartAccountRelayer
          file: ../abis/fluidkey/SmartAccountRelayer.json
      eventHandlers:
        - event: OperationRelayed(indexed uint256,indexed bool)
          handler: handleOperationRelayed
          receipt: true
      file: ../src/fluidkey/smart-account-relayer.ts

  - kind: ethereum
    name: PrivacyPoolsEntrypointProxy
    network: mainnet
    source:
      address: "0x6818809EefCe719E480a7526D76bD3e561526b46"
      abi: PrivacyPoolsEntrypointProxy
      startBlock: 22153715
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - PrivacyPoolsDeposit
        - PrivacyPoolsWithdrawal
      abis:
        - name: PrivacyPoolsEntrypointProxy
          file: ../abis/privacy-pools/PrivacyPoolsEntrypointProxy.json
      eventHandlers:
        - event: Deposited(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
          receipt: true
        - event: WithdrawalRelayed(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdrawal
          receipt: true
        - event: PoolRegistered(address,address,uint256)
          handler: handlePoolRegistered
        - event: PoolRemoved(address,address,uint256)
          handler: handlePoolRemoved
      file: ../src/privacy-pools/privacy-pools.ts

  - kind: ethereum
    name: WETH
    network: mainnet
    source:
      address: "0xc02aaa39b223fe8d0a0e5c4f27ead9083c756cc2"
      abi: WETH
      startBlock: 24470196
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - WormProtocolStats
        - WormOperationStats
        - WormWithdraw
      abis:
        - name: WETH
          file: ../abis/worm/WETH.json
      eventHandlers:
        - event: Withdrawal(indexed address,uint256)
          handler: handleWithdrawal
          receipt: true
      file: ../src/worm/weth.ts

  - kind: ethereum
    name: LiquidityManager
    network: mainnet
    source:
      address: "0xcC10b7098FEf1aB2f0FF3bE91d2A7B3230b90CF0"
      abi: LiquidityManager
      startBlock: 24383794
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ZERC20ProtocolStats
        - ZERC20OperationStats
        - ZERC20WrappedStats
        - ZERC20UnwrappedStats
        - ZERC20Wrap
        - ZERC20Unwrap
      abis:
        - name: LiquidityManager
          file: ../abis/zerc20/LiquidityManager.json
      eventHandlers:
        - event: Wrapped(indexed address,indexed address,uint256,uint256)
          handler: handleWrapped
          receipt: true
        - event: Unwrapped(indexed address,indexed address,uint256,uint256)
          handler: handleUnwrapped
          receipt: true
      file: ../src/zerc20/liquidity-manager.ts

  - kind: ethereum
    name: zERC20
    network: mainnet
    source:
      address: "0x410056c6f0a9abd8c42b9eef3bb451966fb0d924"
      abi: zERC20
      startBlock: 24383714
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ZERC20ProtocolStats
        - ZERC20OperationStats
        - ZERC20TeleportStats
        - ZERC20Teleport
      abis:
        - name: zERC20
          file: ../abis/zerc20/zERC20.json
      eventHandlers:
        - event: Teleport(indexed address,uint256)
          handler: handleTeleport
          receipt: true
      file: ../src/zerc20/zerc20.ts

  - kind: ethereum
    name: LiquidityV2
    network: mainnet
    source:
      address: "0xF65e73aAc9182e353600a916a6c7681F810f79C3"
      abi: LiquidityV2
      startBlock: 22752152
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - IntmaxScrollProtocolStats
        - IntmaxScrollOperationStats
        - IntmaxScrollDepositStats
        - IntmaxScrollDeposit
      abis:
        - name: LiquidityV2
          file: ../abis/intmax/LiquidityV2.json
      eventHandlers:
        - event: Deposited(indexed uint256,indexed address,indexed bytes32,uint32,uint256,bool,uint256)
          handler: handleDeposit
          receipt: true
      file: ../src/intmax/liquidity-v2.ts

templates:
  - kind: ethereum
    name: TornadoInstance
    network: mainnet
    source:
      abi: TornadoInstance
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - TornadoCashDeposit
        - TornadoCashWithdrawal
      abis:
        - name: TornadoInstance
          file: ../abis/tornado-cash/TornadoInstance.json
      eventHandlers:
        - event: Deposit(indexed bytes32,uint32,uint256)
          handler: handleDeposit
          receipt: true
        - event: Withdrawal(address,bytes32,indexed address,uint256)
          handler: handleWithdrawal
          receipt: true
      file: ../src/tornado-cash/tornado-instance.ts
