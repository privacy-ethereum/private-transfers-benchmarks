      entities:
        - CurvyWithdraw
      abis:
        - name: CurvyVaultV6
          file: ../abis/curvy/CurvyVaultV6.json
      eventHandlers:
        - event: Withdraw(indexed address,indexed address,uint256)
          handler: handleWithdraw
          receipt: true
      file: ../src/curvy/curvy-vault-v6.ts
