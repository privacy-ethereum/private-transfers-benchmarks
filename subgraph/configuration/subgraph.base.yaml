specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ../schema.graphql
dataSources:
  - kind: ethereum
    name: Shielder
    network: base
    source:
      address: "0x064A67a5484DF6baf36be42F9554d45E7741dCFf"
      abi: Shielder
      startBlock: 33246476
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - BlanksquareProtocolStats
        - BlanksquareOperationStats
        - BlanksquareDepositStats
        - BlanksquareWithdrawStats
        - BlanksquareDeposit
        - BlanksquareWithdraw
      abis:
        - name: Shielder
          file: ../abis/blanksquare/Shielder.json
      eventHandlers:
        - event: Deposit(bytes3,address,uint256,uint256,uint256,uint256,uint256,uint256,bytes)
          handler: handleDeposit
          receipt: true
        - event: Withdraw(bytes3,address,uint256,address,uint256,uint256,address,uint256,uint256,uint256,uint256,uint256,bytes)
          handler: handleWithdraw
          receipt: true
      file: ../src/blanksquare/shielder.ts

  - kind: ethereum
    name: VeilETHQueueV3
    network: base
    source:
      address: "0xA4a926A2E7a22c38e8DFC6744A61a6aA8b06B230"
      abi: VeilETHQueueV3
      startBlock: 37661782
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - VeilCashProtocolStats
        - VeilCashOperationStats
        - VeilCashDepositQueuedStats
        - VeilCashDepositAcceptedStats
        - VeilCashDepositQueued
        - VeilCashDepositAccepted
      abis:
        - name: VeilETHQueueV3
          file: ../abis/veil-cash/VeilETHQueueV3.json
      eventHandlers:
        - event: DepositQueued(indexed uint256,indexed address,uint256,bytes)
          handler: handleDepositQueued
          receipt: true
        - event: DepositAccepted(indexed uint256,indexed address,indexed address,uint256)
          handler: handleDepositAccepted
          receipt: true
      file: ../src/veil-cash/veil-eth-queue-v3.ts

  - kind: ethereum
    name: VeilETHPool
    network: base
    source:
      address: "0x293dCda114533FF8f477271c5cA517209FFDEEe7"
      abi: VeilETHPool
      startBlock: 37986023
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - VeilCashProtocolStats
        - VeilCashOperationStats
        - VeilCashTransferStats
        - VeilCashTransfer
      abis:
        - name: VeilETHPool
          file: ../abis/veil-cash/VeilETHPool.json
      eventHandlers:
        - event: NewNullifier(bytes32)
          handler: handleNewNullifier
          receipt: true
      file: ../src/veil-cash/veil-eth-pool.ts
