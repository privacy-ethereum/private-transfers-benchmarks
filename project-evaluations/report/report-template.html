<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>State of Private Transfers Report 2026</title>
    <style>
      @page {
        size: A4;
        margin: 24mm 18mm;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          "Helvetica Neue",
          Arial,
          sans-serif;
        font-size: 11pt;
        line-height: 1.55;
        color: #1a1a1a;
        max-width: 720px;
        margin: 0 auto;
        padding: 8mm 0;
      }

      h1 {
        font-size: 26pt;
        margin: 0 0 16pt;
        line-height: 1.2;
        page-break-after: avoid;
      }

      h2 {
        font-size: 18pt;
        margin: 28pt 0 10pt;
        padding-bottom: 4pt;
        border-bottom: 1px solid #d4d4d4;
        page-break-after: avoid;
      }

      h3 {
        font-size: 13pt;
        margin: 18pt 0 6pt;
        page-break-after: avoid;
      }

      p {
        margin: 0 0 8pt;
        orphans: 3;
        widows: 3;
      }

      strong {
        font-weight: 600;
      }

      a {
        color: #1d4ed8;
        text-decoration: none;
        word-break: break-word;
      }

      ul,
      ol {
        margin: 0 0 8pt 18pt;
        padding: 0;
      }

      li {
        margin: 0 0 4pt;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin: 10pt 0;
        font-size: 10pt;
      }

      th,
      td {
        border: 1px solid #d4d4d4;
        padding: 6pt 8pt;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #f5f5f5;
        font-weight: 600;
      }

      /* Cover page: title centred vertically, team names anchored to the bottom of page 1. */
      .cover {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-height: 240mm;
        page-break-after: always;
        text-align: center;
      }

      .cover__main {
        margin-top: auto;
        margin-bottom: auto;
      }

      .cover__title {
        font-size: 32pt;
        line-height: 1.15;
        margin: 0 0 14pt;
        page-break-after: auto;
      }

      .cover__subtitle {
        font-size: 14pt;
        color: #555;
        margin: 0;
      }

      .cover__authors {
        margin: 0;
      }

      .cover__authors p {
        margin: 0 0 4pt;
        font-weight: 500;
        font-size: 12pt;
      }
    </style>
  </head>
  <body>
    {{content}}
  </body>
</html>
