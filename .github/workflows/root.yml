name: monorepo-root

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  private-transfers-benchmarks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint
        env:
          ARBITRUM_SUBGRAPH_URL: ${{ secrets.ARBITRUM_SUBGRAPH_URL }}
          MAINNET_SUBGRAPH_URL: ${{ secrets.MAINNET_SUBGRAPH_URL }}
          SEPOLIA_SUBGRAPH_URL: ${{ secrets.SEPOLIA_SUBGRAPH_URL }}

      - name: Format
        run: pnpm run format
